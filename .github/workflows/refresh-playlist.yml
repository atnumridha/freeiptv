name: Refresh playlist

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build playlist and screenshots
        run: >
          python3 scripts/build_playlist.py
          --refresh-workers 24
          --refresh-timeout 10
          --capture-workers 8
          --capture-timeout 90
          --capture-seconds 2
          --retry-capture-seconds 20

      - name: Commit and push changes
        run: |
          git add README.md in.m3u reports/in-report.json reports/screenshot-report.json screenshots/latest
          if git diff --cached --quiet; then
            echo "No playlist changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh India IPTV playlist"
          git push
