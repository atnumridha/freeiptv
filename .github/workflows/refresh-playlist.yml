name: Refresh playlist

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build playlist
        run: >
          python3 scripts/build_playlist.py
          --skip-screenshots
          --refresh-workers 24
          --refresh-timeout 10

      - name: Commit and push playlist changes
        run: |
          git add README.md in.m3u reports/in-report.json
          if git diff --cached --quiet; then
            echo "No playlist changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh India IPTV playlist"
          git push

      - name: Capture screenshots
        id: screenshots
        continue-on-error: true
        run: >
          python3 scripts/capture_channel_screenshots.py
          --playlist in.m3u
          --readme README.md
          --output-dir screenshots/latest
          --report reports/screenshot-report.json
          --workers 8
          --timeout 90
          --capture-seconds 2
          --retry-capture-seconds 20

      - name: Commit and push screenshot changes
        if: steps.screenshots.outcome == 'success'
        run: |
          git add README.md reports/screenshot-report.json screenshots/latest
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh IPTV playback screenshots"
          git push

      - name: Report screenshot capture failure
        if: steps.screenshots.outcome == 'failure'
        run: |
          echo "::warning::Screenshot capture failed on the GitHub runner. Playlist refresh was already committed; rerun manually to refresh screenshots."
          if [ -f reports/screenshot-report.json ]; then
            python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/screenshot-report.json").read_text())
          print(f"Screenshot report: captured {report.get('captured', 0)}/{report.get('checked', 0)}")
          failures = [item for item in report.get("results", []) if not item.get("ok")]
          for item in failures[:20]:
              print(f"- {item.get('name')}: {item.get('error')}")
          PY
          fi

      - name: Build South Asia and cricket playlist
        id: south_asia_cricket
        if: always()
        run: >
          python3 scripts/scrape_south_asia_cricket_playlist.py
          --workers 24
          --timeout 20
          --capture-workers 8
          --capture-timeout 90
          --capture-seconds 2
          --retry-capture-seconds 20

      - name: Commit and push South Asia and cricket playlist changes
        if: always() && steps.south_asia_cricket.outcome == 'success'
        run: |
          git add south_asia_cricket.m3u \
            reports/south-asia-cricket-report.json \
            reports/south-asia-cricket-screenshot-report.json \
            reports/south-asia-cricket-channels.md \
            screenshots/south-asia-cricket
          if git diff --cached --quiet; then
            echo "No South Asia and cricket playlist changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh South Asia cricket IPTV playlist"
          git push
